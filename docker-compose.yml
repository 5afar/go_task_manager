version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pet
      POSTGRES_PASSWORD: petpass
      POSTGRES_DB: petdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "$${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: "$${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://pet:petpass@postgres:5432/petdb?sslmode=disable
      REDIS_PASSWORD: "$${REDIS_PASSWORD}"
      AUTO_MIGRATE: "1"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
