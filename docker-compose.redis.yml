version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: pet_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    env_file:
      - .env

volumes:
  redis-data:
